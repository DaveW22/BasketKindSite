<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found – Kind Basket</title>
    <link rel="icon" href="/docs/favicon.ico" />
    <style>
      body {
        font-family: 'Segoe UI', 'Roboto', 'Arial', sans-serif;
        background: #f7fafc;
        color: #2d3748;
        margin: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
      }
      .container {
        text-align: center;
        padding: 2rem;
        background: #fff;
        border-radius: 1.5rem;
        box-shadow: 0 2px 16px rgba(0,0,0,0.07);
        max-width: 400px;
      }
      .logo {
        width: 64px;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 2.5rem;
        margin: 0.5rem 0 0.25rem 0;
        color: #319795;
      }
      p {
        margin: 0.5rem 0 1.5rem 0;
        color: #4a5568;
      }
      a {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.75rem 1.5rem;
        background: #319795;
        color: #fff;
        border-radius: 2rem;
        text-decoration: none;
        font-weight: 600;
        transition: background 0.2s;
      }
      a:hover {
        background: #285e61;
      }
      .subtle {
        font-size: 0.95rem;
        color: #a0aec0;
        margin-top: 2rem;
      }
    </style>
    <script>
      // SPA redirect for GitHub Pages
      var l = window.location;
      var path = l.pathname.replace(/^\/docs/, "");
      if (!l.pathname.endsWith('/404.html')) {
        window.location.replace("./index.html" + (path ? "#" + path : "") + l.search + l.hash);
      }
    </script>
  </head>
  <body>
    <div class="container">
      <img src="/docs/favicon.ico" alt="Kind Basket logo" class="logo" />
      <h1>404</h1>
      <p>Oops! The page you’re looking for can’t be found.</p>
      <p>It may have moved, or the link may be broken.</p>
      <a href="/">Back to Home</a>
      <div class="subtle">&copy; 2026 Kind Basket</div>
    </div>
  </body>
</html>
